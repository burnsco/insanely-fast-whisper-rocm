x-rocm-dev-service: &rocm-dev-service
  build:
    context: .
    dockerfile: Dockerfile
    target: dev
  image: ghcr.io/burnsco/insanely-fast-whisper-rocm:dev
  restart: unless-stopped
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  stdin_open: true
  tty: true
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  group_add:
    - video
  ipc: host
  shm_size: 8G
  env_file:
    - ${HOME}/.config/insanely-fast-whisper-rocm/.env
  volumes:
    - ./insanely_fast_whisper_rocm:/app/insanely_fast_whisper_rocm
    - ./tests:/app/tests
    - ./scripts:/app/scripts
    - ./transcripts:/app/transcripts
    - ./transcripts-txt:/app/transcripts-txt
    - ./transcripts-srt:/app/transcripts-srt
    - ./temp_uploads:/app/temp_uploads
    - ${HOME}/.cache/huggingface/hub:/root/.cache/huggingface/hub

services:
  api:
    <<: *rocm-dev-service
    ports:
      - "${DEV_API_PORT:-8889}:8888"
    command: ["insanely-fast-whisper-rocm", "--host", "0.0.0.0", "--port", "8888", "--reload"]

  webui:
    <<: *rocm-dev-service
    profiles: ["webui"]
    ports:
      - "${DEV_WEBUI_PORT:-7862}:7860"
    command:
      ["insanely-fast-whisper-webui", "--host", "0.0.0.0", "--port", "7860", "--debug"]
