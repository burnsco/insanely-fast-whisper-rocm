x-rocm-service: &rocm-service
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  image: ghcr.io/burnsco/insanely-fast-whisper-rocm:main
  restart: unless-stopped
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  stdin_open: true
  tty: true
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  group_add:
    - video
  ipc: host
  shm_size: 8G
  env_file:
    - ${HOME}/.config/insanely-fast-whisper-rocm/.env
  volumes:
    - ./transcripts:/app/transcripts
    - ./transcripts-txt:/app/transcripts-txt
    - ./transcripts-srt:/app/transcripts-srt
    - ${HOME}/.cache/huggingface/hub:/root/.cache/huggingface/hub

services:
  api:
    <<: *rocm-service
    ports:
      - "${API_PORT:-8888}:8888"
    command: ["insanely-fast-whisper-rocm", "--host", "0.0.0.0", "--port", "8888"]

  webui:
    <<: *rocm-service
    profiles: ["webui"]
    ports:
      - "${WEBUI_PORT:-7860}:7860"
    command:
      ["insanely-fast-whisper-webui", "--host", "0.0.0.0", "--port", "7860"]
